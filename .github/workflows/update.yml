name: Update Extensions

on:
    schedule:
        - cron: '0 */4 * * *'
    workflow_dispatch:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        if: github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]'
        outputs:
            updated: ${{ steps.update.outputs.updated }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Update extensions (quick)
              id: update
              run: bun run update --quick

            - name: Format extensions.json
              if: steps.update.outputs.updated == 'true'
              run: bun run format

            - name: Commit and push changes
              if: steps.update.outputs.updated == 'true'
              run: |
                  git config --local user.name "github-actions[bot]"
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git add extensions.json
                  git diff-index --quiet HEAD || git commit -m "chore: update extensions.json"
                  git push

    sync-to-gitlab:
        runs-on: ubuntu-latest
        needs: update
        if: needs.update.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: main
                  fetch-depth: 0

            - name: Sync to GitLab
              uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75 # v1.1.1
              with:
                  target_repo_url: ${{ secrets.GITLAB_REPO }}
                  ssh_private_key: ${{ secrets.GITLAB_SSH }}

    sync-to-dufs:
        runs-on: ubuntu-latest
        needs: update
        if: needs.update.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        env:
            SYNC_DUFS_URL: ${{ secrets.SYNC_DUFS_URL }}

        steps:
            - name: Check DUFS sync config
              id: dufs
              run: |
                  if [ -n "$SYNC_DUFS_URL" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "SYNC_DUFS_URL is not set; skipping DUFS sync."
                  fi

            - name: Checkout repository
              if: steps.dufs.outputs.enabled == 'true'
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install bun
              if: steps.dufs.outputs.enabled == 'true'
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: latest

            - name: Install dependencies
              if: steps.dufs.outputs.enabled == 'true'
              run: bun install --frozen-lockfile

            - name: Sync to DUFS
              if: steps.dufs.outputs.enabled == 'true'
              run: bun run sync --use-cache
              env:
                  SYNC_DUFS_URL: ${{ secrets.SYNC_DUFS_URL }}
                  SYNC_DUFS_AUTH: ${{ secrets.SYNC_DUFS_AUTH }}
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
                  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
