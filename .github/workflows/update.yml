name: Update Extensions

on:
    schedule:
        - cron: '0 */4 * * *'
    workflow_dispatch:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        if: github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]'
        outputs:
            updated: ${{ steps.update.outputs.updated }}
            dufs_enabled: ${{ steps.dufs.outputs.enabled }}

        steps:
            - name: Check DUFS sync config
              id: dufs
              run: |
                  if [ -n "$RCLONE_CONFIG" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "RCLONE_CONFIG is not set; DUFS sync will be skipped."
                  fi
              env:
                  RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check extension updates
              id: update
              run: bun run update:check

            - name: Format extensions.json
              if: steps.update.outputs.updated == 'true'
              run: bun run format

            - name: Commit and push changes
              if: steps.update.outputs.updated == 'true'
              run: |
                  git config --local user.name "github-actions[bot]"
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git add extensions.json
                  git diff-index --quiet HEAD || git commit -m "chore: update extensions.json"
                  git push

    sync-to-gitlab:
        runs-on: ubuntu-latest
        needs: update
        if: needs.update.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: main
                  fetch-depth: 0

            - name: Sync to GitLab
              uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75 # v1.1.1
              with:
                  target_repo_url: ${{ secrets.GITLAB_REPO }}
                  ssh_private_key: ${{ secrets.GITLAB_SSH }}

    sync-to-dufs:
        runs-on: ubuntu-latest
        needs: update
        if: (needs.update.outputs.updated == 'true' || github.event_name == 'workflow_dispatch') && needs.update.outputs.dufs_enabled == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: main

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: latest

            - name: Setup Rclone
              uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
              with:
                  rclone_config: ${{ secrets.RCLONE_CONFIG }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Prepare dist
              run: bun run prepare:dist
              env:
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
                  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
                  PUBLIC_MEILISEARCH_HOST: ${{ secrets.PUBLIC_MEILISEARCH_HOST }}
                  PUBLIC_MEILISEARCH_DEFAULT_SEARCH_KEY: ${{ secrets.PUBLIC_MEILISEARCH_DEFAULT_SEARCH_KEY }}

            - name: Sync to DUFS
              run: |
                  rclone sync ./dist dufs: \
                      --transfers 20 \
                      --checkers 20 \
                      --retries 3 \
                      --retries-sleep 5s \
                      --log-level INFO \
                      --progress \
                      --stats-one-line-date
